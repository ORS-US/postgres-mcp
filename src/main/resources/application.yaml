server:
  port: 8033

spring:
  application:
    name: postgres-mcp
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: myuser
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: 10000  # fail fast on startup if DB unreachable
      connection-test-query: SELECT 1      # validate connection is alive
      keepalive-time: 60000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000        # keeps connection alive through VPN
  ai:
    mcp:
      server:
        name: postgres-mcp
        version: 1.0.0
        type: SYNC
        protocol: STREAMABLE